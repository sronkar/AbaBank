# Fly.io config — run `fly launch --copy-config` then `fly volumes create ababank_data --size 1`
app = "ababank"
primary_region = "fra"

[build]

[env]
  DATA_DIR = "/data"

[mounts]
  source = "ababank_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  # Keep one machine always running so daily interest/allowance cron fires on time.
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
